name: Build and AppInspect

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-appinspect:
    uses: Bre77/splunk_nats/.github/workflows/_reusable-build-appinspect.yml@main
    with:
      app_dir: "."
      use_ucc_gen: false
      build_command: "./.build.sh"
      package_glob: "*.spl"
      node_version: "20"
      splunk_python_version: "3.9"
      fail_on: "errors"
